name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      publish_npm:
        description: "Publish shipvitals to npm"
        required: true
        default: false
        type: boolean
      publish_pypi:
        description: "Publish shipvitals-cli to PyPI"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  npm:
    if: inputs.publish_npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      - run: npm run test:node
      - run: npm run test:package
      - run: npm pack --dry-run
      - name: Publish npm beta
        run: npm publish --tag beta --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  pypi:
    if: inputs.publish_pypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade build twine
      - run: python -m compileall -q skills/shipvitals/scripts shipvitals_cli
      - run: python -m build --sdist --wheel
      - run: python -m twine check dist/*
      - name: Publish PyPI beta
        run: python -m twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
