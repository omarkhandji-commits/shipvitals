name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: python -m pip install pytest
      - run: npm run validate
      - run: npm run scorecard
      - run: npm run schema:check
      - run: npm run tone:check
      - run: npm run test:compile
      - run: npm run test
      - run: npm pack --dry-run
      - run: npm run test:package
      - run: npm run site:check
      - id: shipvitals
        uses: ./
        with:
          path: .
          mode: quick
          fail-on-unready: "false"
      - name: Check action output
        shell: bash
        run: test -n "${{ steps.shipvitals.outputs.verdict }}"
      - id: blocked-audit
        continue-on-error: true
        uses: ./
        with:
          path: tests/fixtures/mock-secret
      - name: Check blocking action
        shell: bash
        run: test "${{ steps.blocked-audit.outcome }}" = "failure"

  node-cli:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: "18"
          - os: ubuntu-latest
            node: "22"
          - os: windows-latest
            node: "20"
          - os: macos-latest
            node: "20"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm run test:node
      - run: npm run test:package
