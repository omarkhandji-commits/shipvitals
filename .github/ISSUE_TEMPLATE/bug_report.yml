name: Bug report
description: Report a crash, install problem, or incorrect behavior.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: input
    id: command
    attributes:
      label: Command
      description: Exact command you ran.
      placeholder: shipvitals audit .
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Output
      description: Paste the relevant output or attach the report.
      render: text
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: shipvitals 1.0.0-beta.1, node 20, python 3.12
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, package manager, CI/local, repo type.
