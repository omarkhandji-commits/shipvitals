name: ShipVitals
description: "Run ShipVitals as a release gate."
author: "omarkhandji-commits"
branding:
  icon: "activity"
  color: "orange"
inputs:
  path:
    description: "Project path to audit"
    required: false
    default: .
  mode:
    description: "Audit mode: quick or deep"
    required: false
    default: quick
  runtime-proof:
    description: "Path to a runtime.shipvitals-evidence.json manifest."
    required: false
    default: ""
  visual-proof:
    description: "Path to a visual.shipvitals-evidence.json manifest."
    required: false
    default: ""
  ci-proof:
    description: "Path to a commit-bound CI evidence manifest; generated automatically when omitted."
    required: false
    default: ""
  independent-review:
    description: "Path to an independent_review.shipvitals-evidence.json manifest."
    required: false
    default: ""
  fail-on-unready:
    description: "Fail the workflow unless the verdict is READY."
    required: false
    default: "true"
outputs:
  verdict:
    description: "ShipVitals verdict"
    value: ${{ steps.audit.outputs.verdict }}
runs:
  using: composite
  steps:
    - name: Run ShipVitals
      id: audit
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_RUNTIME_PROOF: ${{ inputs.runtime-proof }}
        INPUT_VISUAL_PROOF: ${{ inputs.visual-proof }}
        INPUT_CI_PROOF: ${{ inputs.ci-proof }}
        INPUT_INDEPENDENT_REVIEW: ${{ inputs.independent-review }}
        INPUT_FAIL_ON_UNREADY: ${{ inputs.fail-on-unready }}
        SHIPVITALS_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        SHIPVITALS_COMMIT: ${{ github.sha }}
        SHIPVITALS_GITHUB_TOKEN: ${{ github.token }}
      run: |
        ci_manifest="$RUNNER_TEMP/ci.shipvitals-evidence.json"
        python3 "$GITHUB_ACTION_PATH/skills/shipvitals/scripts/shipvitals_create_ci_evidence.py" "$ci_manifest"
        args=("$INPUT_PATH" --ci --no-fail --mode "$INPUT_MODE")
        if [ -n "$INPUT_RUNTIME_PROOF" ]; then args+=(--runtime-proof "$INPUT_RUNTIME_PROOF"); fi
        if [ -n "$INPUT_VISUAL_PROOF" ]; then args+=(--visual-proof "$INPUT_VISUAL_PROOF"); fi
        if [ -n "$INPUT_CI_PROOF" ]; then ci_manifest="$INPUT_CI_PROOF"; fi
        args+=(--ci-proof "$ci_manifest")
        if [ -n "$INPUT_INDEPENDENT_REVIEW" ]; then args+=(--independent-review "$INPUT_INDEPENDENT_REVIEW"); fi
        report="$RUNNER_TEMP/shipvitals-report.json"
        python3 "$GITHUB_ACTION_PATH/skills/shipvitals/scripts/shipvitals_runner.py" "${args[@]}" | tee "$report"
        verdict="$(python3 -c "import json,sys; print(json.load(open(sys.argv[1], encoding='utf-8')).get('verdict','NOT VERIFIED'))" "$report")"
        echo "verdict=$verdict" >> "$GITHUB_OUTPUT"
        if [ "$INPUT_FAIL_ON_UNREADY" = "true" ] && [ "$verdict" != "READY" ]; then
          echo "ShipVitals blocked release with verdict: $verdict" >&2
          exit 1
        fi
